<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bolli | Doces - Páscoa</title> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Della+Respira&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Della Respira', 'serif'],
                        script: ['"Dancing Script"', 'cursive']
                    },
                    colors: {
                        'bolli-purple-dark': '#4a1d3b',
                        'bolli-purple-light': '#8c4a6f',
                        'bolli-bg': '#ffffff', // Alterado para Branco FFFFFF
                        'bolli-text-dark': '#3a2d27',
                        'bolli-text-light': '#6b5e59',
                        'bolli-special-bg': '#4a1d3b', // Roxo Bolli nas escritas
                        'bolli-desc': '#919191',
                        'bolli-nav-bg': '#4a1d3b', // Barra de navegação no roxo Bolli
                        'bolli-nav-text': '#ffffff',
                        'bolli-cart-title': '#4a1d3b'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-bolli-bg text-bolli-text-dark">

    <header class="shadow-lg">
        <div class="relative w-full h-[400px] bg-no-repeat bg-cover bg-center" style="background-image: url('listras.png');">
        </div>
        
        <nav id="main-nav" class="bg-bolli-nav-bg text-bolli-nav-text py-4 sticky top-0 z-40"> 
            <div class="max-w-6xl mx-auto px-4 flex justify-between items-center relative">
                <ul class="flex items-center space-x-3 sm:space-x-6 md:space-x-10 font-sans text-sm sm:text-lg md:text-xl font-medium"> 
                    <li><a href="#cookies" class="hover:text-gray-300 transition-colors smooth-scroll">Cookies</a></li>
                    <li><a href="#pascoa" class="hover:text-gray-300 transition-colors smooth-scroll">Cardápio Páscoa</a></li>
                    <li><a href="#suspiros" class="hover:text-gray-300 transition-colors smooth-scroll">Suspiros</a></li>
                    <li><a href="#contato" class="hover:text-gray-300 transition-colors smooth-scroll">Contato</a></li>
                </ul>
                
                <div class="">
                    <button id="open-cart-btn" class="relative hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count-badge" class="absolute -top-2 -right-3 bg-bolli-purple-light text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        
        <section id="cookies" class="pb-24"> 
            <div class="flex items-center justify-center text-center mb-14">
                <div class="flex-1 h-px bg-bolli-desc"></div>
                <h2 class="text-4xl sm:text-5xl font-sans text-bolli-special-bg mx-6 md:mx-10">Nossos cookies</h2>
                <div class="flex-1 h-px bg-bolli-desc"></div>
            </div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center"></div>
        </section>

        <section 
            id="pascoa" 
            class="py-10 bg-cover bg-center border-[12px] border-double border-bolli-purple-dark" 
            style="background-image: url('moldura-pascoa.png');" 
        >
            <div class="bg-white max-w-4xl mx-auto p-6 sm:p-10 shadow-sm">
                
                <h2 class="text-4xl sm:text-5xl font-sans text-center text-bolli-purple-dark mb-10"> 
                    Cardápio Páscoa
                </h2>
                
                <div id="pascoa-product-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-6 justify-items-center max-w-4xl mx-auto px-4"> 
                    </div>
            </div>
        </section>

        <section id="suspiros" class="py-20 text-center">
            <div class="flex items-center justify-center text-center mb-14">
                <div class="flex-1 h-px bg-bolli-desc"></div>
                <h2 class="text-4xl sm:text-5xl font-sans text-bolli-special-bg mx-6 md:mx-10">Suspiros</h2>
                <div class="flex-1 h-px bg-bolli-desc"></div>
            </div>
            <div id="suspiros-product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center"></div>
        </section>
        
    </main>

    <footer id="contato" class="bg-white border-t border-gray-200 py-8">
        </footer>

    <script src="script.js" defer></script>
</body>
</html>
